services:
  - type: web
    name: student-portal-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: IDFY_API_KEY
        sync: false
      - key: IDFY_ACCOUNT_ID
        sync: false
      - key: IDFY_BASE_URL
        sync: false
      - key: IDFY_CREATE_TASK_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
